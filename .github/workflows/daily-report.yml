name: Daily Betting Report

on:
  workflow_dispatch:
  schedule:
    # 14:00 UTC is 16:00 in Norway during daylight saving time.
    - cron: "0 14 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: daily-betting-report
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Generate static report
        env:
          BETTING_REPO_DIR: ${{ github.workspace }}
          BETTING_PUBLIC_DIR: ${{ github.workspace }}/public
          BETTING_INPUT_CSV: ${{ github.workspace }}/examples/norsk_tipping_candidates.csv
          BETTING_RESEARCH_SOURCES: ${{ github.workspace }}/examples/research_sources.txt
          BETTING_REPORT_TOKEN: ${{ secrets.BETTING_REPORT_TOKEN }}
          BETTING_ENABLE_AI: "true"
          BETTING_OPENAI_MODEL: gpt-5.5
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: scripts/publish_static_report.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
