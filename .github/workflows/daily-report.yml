name: Daily Betting Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-report.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "examples/**"
      - "reference_odds.csv"
      - "scripts/publish_static_report.sh"
      - "src/**"
  schedule:
    # 14:00 UTC is 16:00 in Norway during daylight saving time.
    - cron: "0 14 * * *"
    # 22:00 UTC is midnight in Norway during daylight saving time.
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: daily-betting-report
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate static report
        env:
          BETTING_REPO_DIR: ${{ github.workspace }}
          BETTING_PUBLIC_DIR: ${{ github.workspace }}/public
          BETTING_CANDIDATE_SOURCE: norsk-tipping-live
          BETTING_SPORT_SCOPE: football
          BETTING_PICK_COUNT: "5"
          BETTING_MIN_ODDS: "1.10"
          BETTING_MAX_ODDS: "1.30"
          BETTING_NT_EVENTS_PER_SPORT: "35"
          BETTING_RESEARCH_SOURCES: ${{ github.workspace }}/examples/football_research_sources.txt
          BETTING_ODDS_API_KEY: ${{ secrets.BETTING_ODDS_API_KEY }}
          BETTING_ODDS_API_BOOKMAKERS: unibet_se,pinnacle,betfair_ex_eu,betsson,williamhill
          BETTING_ODDS_API_EVENT_ODDS_LIMIT: "2"
          BETTING_FOOTBALL_DATA_API_KEY: ${{ secrets.BETTING_FOOTBALL_DATA_API_KEY }}
          BETTING_FOOTBALL_DATA_PROVIDER: api_football
          BETTING_API_FOOTBALL_MAX_FIXTURES: "2"
          BETTING_API_FOOTBALL_MAX_FORM_TEAMS: "4"
          BETTING_REPORT_TOKEN: ${{ secrets.BETTING_REPORT_TOKEN }}
          BETTING_DELIVERY: ${{ secrets.BETTING_PUSHOVER_TOKEN != '' && secrets.BETTING_PUSHOVER_USER != '' && 'pushover' || 'none' }}
          BETTING_PUSHOVER_TOKEN: ${{ secrets.BETTING_PUSHOVER_TOKEN }}
          BETTING_PUSHOVER_USER: ${{ secrets.BETTING_PUSHOVER_USER }}
          BETTING_ENABLE_AI: "true"
          BETTING_OPENAI_MODEL: gpt-5.5
          BETTING_AI_MAX_OUTPUT_TOKENS: "3500"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: scripts/publish_static_report.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
